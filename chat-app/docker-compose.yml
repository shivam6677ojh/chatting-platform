version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: chatsphere-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: chatsphere-server
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/realtime_chat
      JWT_SECRET: replace_with_long_secret
      CLIENT_ORIGIN: http://localhost:5173
      GOOGLE_CLIENT_ID: your_google_oauth_client_id.apps.googleusercontent.com
      ALLOW_LOCAL_SIGNUP: "false"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5000/api
        VITE_SOCKET_URL: http://localhost:5000
        VITE_GOOGLE_CLIENT_ID: your_google_oauth_client_id.apps.googleusercontent.com
        VITE_ALLOW_LOCAL_SIGNUP: "false"
    container_name: chatsphere-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:80"

volumes:
  mongo-data:
